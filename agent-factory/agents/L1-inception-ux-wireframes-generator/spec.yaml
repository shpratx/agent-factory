# Agent Specification Document
spec_version: "1.0"
artifact_type: agent
metadata:
  name: L1-inception-template-agent
  version: "1.0.0"
  layer: L1
  phase: inception
  owner: agentic-ai-coe
  created: 2026-04-09

purpose:
  description: "Generates one exciting fact for the topic mentioned"
  input: "Topic to state a fact for"
  output: "A unique fact for the topic mentioned in the input"
  business_value: "To know a new fact for the mentioned topic"

prompt:
  ref: "prompts/L1-inception-template-agent/instructions.md"  # External prompt file
  version: "1.0.0"
  description: "Generates the fact in plain text"

contract:
  # Schemas: schemas/agent-input-contract-schema.json & schemas/agent-output-schema.json
  input_schema: "$ref: schemas/agent-input-contract-schema.json"
  output_schema: "$ref: schemas/agent-output-schema.json"

  input:
    accepts_from_agents: [any]
    accepts_direct_input: true
    accepts_file_upload:
      enabled: false
    required_parameters:
      topic: {type: string, max_length: 5000, description: "Topic to state the fact about"}
  
  output:
    type: fact
    schema_version: "1.0"
    items_schema:
      type: object
      required: [title, description]
      properties:
        title: {type: string}
        description: {type: string, format: "A unique fact is: "}
    metadata_per_item:
      confidence: {type: float, range: "0.7"}
      reasoning: {type: string, description: "Explanation of how the agent arrived at this item"}
      sources_cited: {type: array, items: {type: string}}

context:
  knowledge_bases: []
  guardrails: []
  tools: []

quality:
  evaluation_rubric: story-quality-rubric-v1
  min_score: 7.0
  hallucination_check: true
  consistency_check: true  # same input → same structure output

#performance:
