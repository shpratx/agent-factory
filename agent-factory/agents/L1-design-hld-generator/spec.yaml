# Agent Specification Document
spec_version: "1.0"
artifact_type: agent
metadata:
  name: L1-design-hld-generator-agent
  version: "1.0.0"
  layer: L1
  phase: design
  owner: agentic-ai-coe
  created: 2026-06-16

purpose:
  description: "Generates a High-Level Design (HLD) from epics and stories, defining system architecture, component interactions, data flows, and technology decisions for implementation"
  input: "Structured epics with features and stories from upstream inception agents"
  output: "High-level design document covering architecture, components, APIs, data model, integrations, and deployment topology"
  business_value: "Bridges requirements and code — gives development teams the architectural blueprint to implement stories correctly without ambiguity"

prompt:
  ref: "prompts/L1-design-hld-generator-agent/instructions.md"
  version: "1.0.0"
  description: "Generates HLD with architecture decisions, component design, and API contracts"

contract:
  input_schema: "$ref: schemas/agent-input-contract-schema.json"
  output_schema: "$ref: schemas/agent-output-schema.json"

  input:
    accepts_from_agents: [L1-inception-epics-generator-agent, L1-inception-stories-generator-agent]
    accepts_direct_input: true
    accepts_file_upload:
      enabled: true
      formats: [".json", ".md"]
    required_parameters:
      epics: {type: array, description: "Epics with features from the epics generator"}
    optional_parameters:
      stories: {type: array, description: "Stories from the stories generator (enriches design detail)"}
      target_epic: {type: string, description: "Generate HLD for a specific epic only"}

  output:
    $ref: "output_schema.json"

context:
  knowledge_bases:
    - kb-L1-enterprise-architecture
    - kb-L1-golang-api-standards
    - kb-L1-golang-api-scaffold
    - kb-L1-microservices-architecture
  guardrails:
    - gr-L1-output-schema-validator
    - gr-L1-pii-detection
    - gr-L3-hallucination-detector
    - gr-L3-citation-validator
    - gr-L3-consistency-checker

quality:
  evaluation_ref: "evaluation.md"
  min_score: 7.0
  hallucination_check: true
  consistency_check: true

versioning:
  input_version: "1.0"
  output_version: "1.0"
  instruction_hash: "sha256:pending"
