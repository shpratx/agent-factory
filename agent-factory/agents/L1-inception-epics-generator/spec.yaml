# Agent Specification Document
spec_version: "1.0"
artifact_type: agent
metadata:
  name: L1-inception-epics-generator-agent
  version: "1.0.0"
  layer: L1
  phase: inception
  owner: agentic-ai-coe
  created: 2026-06-14

purpose:
  description: "Converts structured requirements into epics and features that implement those requirements"
  input: "Structured requirements output from L1-inception-requirements-extractor-agent"
  output: "Epics with features, traceability to source requirements, and implementation scope"
  business_value: "Transforms requirements into plannable delivery units that can be broken into stories and scheduled into feature cycles"

prompt:
  ref: "prompts/L1-inception-epics-generator-agent/instructions.md"
  version: "1.0.0"
  description: "Generates epics and features from requirements with traceability"

contract:
  input_schema: "$ref: schemas/agent-input-contract-schema.json"
  output_schema: "$ref: schemas/agent-output-schema.json"

  input:
    accepts_from_agents: [L1-inception-requirements-extractor-agent]
    accepts_direct_input: true
    accepts_file_upload:
      enabled: true
      formats: [".json", ".md"]
    required_parameters:
      requirements: {type: object, description: "Structured requirements output (functional_requirements, non_functional_requirements, constraints)"}
    optional_parameters:
      max_epics: {type: integer, default: 10, description: "Maximum number of epics to generate"}
      grouping_strategy: {type: string, default: "capability", description: "How to group: capability | user_journey | domain_area"}

  output:
    $ref: "output_schema.json"

context:
  knowledge_bases:
    - kb-L1-ntuc-enterprise-architecture    # Enterprise architecture standards and technology constraints
    - kb-L1-epics-best-practices       # Epic and feature decomposition best practices
    - kb-L1-inception-epics-generator-evaluation
  guardrails:
    - gr-L1-output-schema-validator
    - gr-L1-pii-detection
    - gr-L3-hallucination-detector
    - gr-L3-citation-validator
    - gr-L3-consistency-checker

quality:
  evaluation_ref: "evaluation.md"
  min_score: 7.0
  hallucination_check: true
  consistency_check: true

versioning:
  input_version: "1.0"
  output_version: "1.0"
  instruction_hash: "sha256:pending"
