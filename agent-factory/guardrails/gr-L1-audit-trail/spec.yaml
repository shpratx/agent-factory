spec_version: "1.0"
artifact_type: guardrail
metadata:
  name: gr-L1-audit-trail
  version: "1.0.0"
  layer: L1
  owner: agentic-ai-coe
  implementation: colang  # pure Colang — no Python actions

purpose:
  description: "Ensure every agent execution produces a complete audit record for compliance and traceability"

triggers_on:
  - post_execution

on_fail: block  # Missing traceability fields → block output delivery

applies_to: all_agents

rules:
  - name: traceability-fields
    description: "agent_id, execution_id, agent_version must all be present and non-empty"
    check: LLM validates via self_check_output_audit prompt
    action: block
    severity: critical

  - name: input-recorded
    description: "input_summary.source must be a valid enum (agent_output | direct_input | file_upload) and input_summary.parameters must be a non-empty object"
    check: LLM validates via self_check_output_audit prompt
    action: block
    severity: high

  - name: output-recorded
    description: "output.type must be a valid enum and output.schema_version must be present"
    check: LLM validates via self_check_output_audit prompt
    action: block
    severity: high

  - name: audit-summary-logged
    description: "A one-line audit summary is produced capturing WHO (agent_id, version), WHAT (exec_id, type, item count), FROM (source), and status"
    check: LLM generates via generate_audit_summary prompt
    action: log
    severity: medium

  - name: pii-masking
    description: "PII patterns (email, phone, SSN, credit card) in parameters are masked in the audit summary before logging"
    check: LLM instructed to mask in generate_audit_summary prompt
    action: mask_in_log
    severity: high

notes:
  - "audit_id and timestamp are generated by the production audit store, not by this guardrail"
  - "In pure Colang mode, audit records are captured in NeMo's conversation log"
  - "For production persistence (DynamoDB, S3, etc.), add an actions.py with persist_audit_record"

evaluation:
  false_positive_threshold: 0.05
