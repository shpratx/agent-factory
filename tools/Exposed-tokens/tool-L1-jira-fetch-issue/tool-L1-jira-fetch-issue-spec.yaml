spec_version: "1.0"
artifact_type: tool
metadata:
  name: tool-L1-jira-fetch-issue
  version: "1.0.0"
  layer: L1
  owner: agentic-ai-coe

purpose:
  description: "Fetches one or more Jira issues with their full nested child hierarchy, returning a clean fixed-schema JSON string."
  platform: jira
  operation: fetch-issue

interface:
  parameters:
    inputJSON:
      type: object
      required: true
      description: >
        Accepts several coerced forms:
          key       (string)       — single Jira issue key (e.g. 'GGMDEMOS-101')
          keys      (array[string]) — multiple Jira issue keys
          maxDepth  (integer, optional, default 5) — max levels of children to traverse
          includeChildren (boolean, optional, default true) — whether to fetch child issues
          userEmail (string, optional) — falls back to JIRA_USER_EMAIL
          apiToken  (string, optional) — falls back to JIRA_API_TOKEN env var
          baseUrl   (string, optional) — falls back to JIRA_BASE_URL
        The validator also accepts a bare key string, comma-separated key string,
        or a JSON-encoded string as input.

  returns:
    type: string
    description: >
      JSON-encoded object (single key) or array (multiple keys). Each node has:
        issue_id, title, status, description (plain text), labels,
        assignee, due_date, reporter, child_work_item_ids, children (recursive).
      Fatal errors return a plain 'Fatal error: ...' string.

credentials:
  source: secrets-sdk
  path: "jira"
  fields_used: [base_url, user_email, api_token]

identity:
  tool_id: "tool-L1-jira-fetch-issue-001"
  role: tool-executor

  invocable_by:
    roles: [content-generator, orchestrator]
    agents: [any-agent-with-read-permission]

  permissions:
    operation: read
    platform: jira
    scope: "project-level"

  credential_scoping:
    method: org-from-context
    vault_path_template: "/secrets/{org_id}/jira"

resilience:
  timeout_seconds: 30
  retry: {max: 2, backoff: exponential, retry_on: [timeout, 429, 502, 503]}
  circuit_breaker: {failure_threshold: 5, reset_seconds: 60}

security:
  input_validation: "inputJSON coerced and validated by Pydantic field_validator before API calls; key/keys presence checked before traversal"
  output_sanitization: "HTTP errors surfaced as structured error fields (issue_id + error + detail) in the JSON output; fatal exceptions return plain error string"
  logging: "Issue keys logged; ADF-to-text conversion applied — raw Jira ADF never passed to caller; API token never logged"
