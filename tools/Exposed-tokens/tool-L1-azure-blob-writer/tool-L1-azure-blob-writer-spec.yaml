spec_version: "1.0"
artifact_type: tool
metadata:
  name: tool-L1-azure-blob-writer
  version: "1.0.0"
  layer: L1
  owner: agentic-ai-coe

purpose:
  description: "Creates a virtual folder and uploads a file with specified content to Azure Blob Storage."
  platform: azure-blob
  operation: write

interface:
  parameters:
    folder_name:
      type: string
      required: true
      description: "Name of the folder to create in Azure Blob Storage (used as blob prefix)"
    file_name:
      type: string
      required: true
      description: "Name of the file to create within the folder"
    content:
      type: string
      required: true
      description: "Text content to write to the file; truncated at 10 MB"

  returns:
    type: string
    description: >
      Multi-line status string reporting container existence/creation,
      folder creation, and file upload results.
      On any error: user-friendly error string (details in azure_blob_operations.log).

credentials:
  source: secrets-sdk
  path: "azure-blob"
  fields_used: [connection_string, container_name, blob_storage_url]

identity:
  tool_id: "tool-L1-azure-blob-writer-001"
  role: tool-executor

  invocable_by:
    roles: [orchestrator]
    agents: [any-agent-with-write-permission]

  permissions:
    operation: write
    platform: azure-blob
    scope: "org-level"

  credential_scoping:
    method: org-from-context
    vault_path_template: "/secrets/{org_id}/azure-blob"

resilience:
  timeout_seconds: 30
  retry: {max: 2, backoff: exponential, retry_on: [timeout, 429, 502, 503]}
  circuit_breaker: {failure_threshold: 5, reset_seconds: 60}

security:
  input_validation: "file_name sanitised (path-traversal chars replaced, leading dots/slashes stripped); content validated as string and capped at 10 MB; folder_name accepted as-is"
  output_sanitization: "SDK exceptions caught; generic error strings returned — no stack traces or internal URLs exposed"
  logging: "Operations logged to azure_blob_operations.log; sanitisation warnings logged; connection string never logged"
