spec_version: "1.0"
artifact_type: tool
metadata:
  name: tool-L1-github-writer-generic
  version: "1.0.0"
  layer: L1
  owner: agentic-ai-coe

purpose:
  description: "Creates a new branch from a source branch and commits one or more files to it in a GitHub repository."
  platform: github
  operation: write

interface:
  parameters:
    files:
      type: array
      required: true
      description: >
        List of file descriptors. Accepts two formats:
        flat   — {"filename": "path/to/file.py", "code": "<content>"}
        nested — {"<folder>": {"filename": "file.py", "code": "<content>"}}
      items:
        type: object
    repo_name:
      type: string
      required: true
      description: "Repository name without the owner prefix (e.g. 'SCIB-Inception')"
    new_branch:
      type: string
      required: true
      description: "Name of the branch to create and commit to (e.g. 'feature/auto-update')"
    source_branch:
      type: string
      required: false
      default: "main"
      description: "Branch to copy as the base for the new branch"

  returns:
    type: object
    fields:
      status: {type: string, description: "'success' or 'failure'"}
      branch: {type: string, description: "Name of the newly created/updated branch"}
      source_branch: {type: string, description: "Branch used as the base"}
      updated_files: {type: array, items: {type: string}, description: "Resolved file paths committed"}
      message: {type: string, description: "Human-readable summary"}
      url: {type: string, description: "GitHub URL to the new branch"}
    on_error: {status: "failure", message: string}

credentials:
  source: secrets-sdk
  path: "github"
  fields_used: [api_token, repo_owner]

identity:
  tool_id: "tool-L1-github-writer-generic-001"
  role: tool-executor

  invocable_by:
    roles: [orchestrator]
    agents: [any-agent-with-write-permission]

  permissions:
    operation: write
    platform: github
    scope: "org-level"

  credential_scoping:
    method: org-from-context
    vault_path_template: "/secrets/{org_id}/github"

resilience:
  timeout_seconds: 30
  retry: {max: 2, backoff: exponential, retry_on: [timeout, 429, 502, 503]}
  circuit_breaker: {failure_threshold: 5, reset_seconds: 60}

security:
  input_validation: "files list and repo_name validated implicitly by Pydantic schema; idempotent — existing branch detected via 422 and commit is stacked on top"
  output_sanitization: "All exceptions caught; error detail surfaced only as message string in returned dict"
  logging: "Commit message includes UTC timestamp; token never logged"
