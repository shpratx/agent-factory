spec_version: "1.0"
artifact_type: tool
metadata:
  name: tool-L1-confluence-reader
  version: "1.0.0"
  layer: L1
  owner: agentic-ai-coe

purpose:
  description: "Reads the title and body of a Confluence page via the REST API, returning the body as Confluence storage format (XHTML)."
  platform: confluence
  operation: read

interface:
  parameters:
    page_id:
      type: string
      required: true
      description: "Numeric ID of the Confluence page (e.g. '425985'). Must be a digit-only string."
    base_url:
      type: string
      required: true
      description: "Base URL of the Confluence instance including '/wiki' path (e.g. 'https://your-domain.atlassian.net/wiki'). Must start with 'https://'."

  returns:
    type: string
    description: >
      On success: "Title: <page title>\nContent: <body in Confluence storage format (XHTML)>"
      The content field is raw Confluence storage format — valid XHTML with
      Confluence-specific macro tags (e.g. <ac:structured-macro>, <ri:page>).
      On error: "Error reading Confluence page: <requests exception message>"

  notes:
    - "The tool contains a silent argument-swap guard: if page_id starts with 'http' OR base_url is all digits, the two arguments are automatically swapped. This compensates for agent argument confusion but can mask incorrect invocations."
    - "body.storage (XHTML) is the only expand field requested; labels, attachments, page metadata, and child pages are not returned."
    - "No HTTP timeout is configured — the request can hang indefinitely on slow Confluence instances."

credentials:
  source: secrets-sdk
  path: "confluence"
  fields_used: [api_key, user_email]

identity:
  tool_id: "tool-L1-confluence-reader-001"
  role: tool-executor

  invocable_by:
    roles: [content-generator, orchestrator]
    agents: [any-agent-with-read-permission]

  permissions:
    operation: read
    platform: confluence
    scope: "org-level"

  credential_scoping:
    method: org-from-context
    vault_path_template: "/secrets/{org_id}/confluence"

resilience:
  timeout_seconds: 30
  retry: {max: 2, backoff: exponential, retry_on: [timeout, 429, 502, 503]}
  circuit_breaker: {failure_threshold: 5, reset_seconds: 60}

security:
  input_validation: "page_id and base_url accepted as-is; no format validation performed before API call"
  output_sanitization: "RequestException caught; exception message surfaced in return string — raw HTTP body not included"
  logging: "Credentials (api_key, user_email) used via HTTP Basic Auth — never logged; page_id logged at invocation"
