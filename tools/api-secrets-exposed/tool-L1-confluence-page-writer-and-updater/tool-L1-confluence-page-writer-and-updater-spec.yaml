spec_version: "1.0"
artifact_type: tool
metadata:
  name: tool-L1-confluence-page-writer-and-updater
  version: "1.0.0"
  layer: L1
  owner: agentic-ai-coe

purpose:
  description: "Creates a new Confluence page, or appends content to an existing page that matches the given title exactly, using the Confluence REST API v1."
  platform: confluence
  operation: write

interface:
  parameters:
    title:
      type: string
      required: true
      description: "Title of the Confluence page. Used for both creation and for exact-match lookup when deciding create-vs-append. Case-sensitive."
    content:
      type: string
      required: true
      description: >
        Body content in Confluence storage format (XHTML). Must be valid XML/XHTML.
        Supported tags: <p>, <h1>–<h6>, <ul>/<ol>/<li>, <table>/<tr>/<th>/<td>,
        <ac:structured-macro>, <ri:*> reference tags.
        Plain text or Markdown is NOT supported — it will be stored as literal text
        and may render incorrectly in Confluence.
    space_key:
      type: string
      required: true
      description: "The key of the Confluence space (e.g. 'ENG', 'TEAM', or a personal space hash like '~7120208dde8969e5854fbfbe0185df21567c33')."
    base_url:
      type: string
      required: true
      description: "Base URL of the Confluence instance including '/wiki' path (e.g. 'https://your-domain.atlassian.net/wiki')."

  returns:
    type: string
    description: >
      On append (page existed):
        "Content appended to existing page.\n
         confluence_page_id: <id> \nbase_url: <url>\nspace_key: <key>\n
         \nPage Title: <title>\nVersion: <new_version>\nURL: <full_web_url>"
      On create (page did not exist):
        "Page created successfully.\n
         confluence_page_id: <id> \nbase_url: <url>\nspace_key: <key>\n
         \nPage Title: <title>\nVersion: 1 \nURL: <full_web_url>"
      On error:
        "Error writing to Confluence page: <exception message>\nDetails: <HTTP response body>"

  notes:
    - "Append is a full read-modify-write. There is no Confluence 'append' endpoint; the tool reads the existing storage body, concatenates <p></p> + new content, and PUTs the entire body back."
    - "Version bumping is mandatory. Confluence uses optimistic locking; the PUT must specify version.number = current + 1. A stale version causes HTTP 409 Conflict."
    - "Concurrency hazard: two parallel runs targeting the same page title will race. One will win; the other will fail with a 409. Run sequentially for the same page."
    - "Title matching is exact and case-sensitive. 'Sprint Notes' and 'sprint notes' are treated as different pages."
    - "No content validation. The tool accepts any string as content and submits it. Malformed XHTML may be silently mangled by Confluence or cause a 400 error."
    - "No HTTP timeout configured on any of the three requests (search GET, update PUT, create POST)."

credentials:
  source: secrets-sdk
  path: "confluence"
  fields_used: [api_key, user_email]

identity:
  tool_id: "tool-L1-confluence-page-writer-and-updater-001"
  role: tool-executor

  invocable_by:
    roles: [orchestrator]
    agents: [any-agent-with-write-permission]

  permissions:
    operation: write
    platform: confluence
    scope: "org-level"

  credential_scoping:
    method: org-from-context
    vault_path_template: "/secrets/{org_id}/confluence"

resilience:
  timeout_seconds: 30
  retry: {max: 2, backoff: exponential, retry_on: [timeout, 429, 502, 503]}
  circuit_breaker: {failure_threshold: 5, reset_seconds: 60}

security:
  input_validation: "No validation of XHTML content before POST/PUT; title and space_key accepted as-is"
  output_sanitization: "RequestException caught; HTTP response body included in error string only on failure — not on success"
  logging: "Credentials used via HTTP Basic Auth — never logged; page title and space_key logged at invocation"
