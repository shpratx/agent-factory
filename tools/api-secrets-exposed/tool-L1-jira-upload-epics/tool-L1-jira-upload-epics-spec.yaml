spec_version: "1.0"
artifact_type: tool
metadata:
  name: tool-L1-jira-upload-epics
  version: "1.0.0"
  layer: L1
  owner: agentic-ai-coe

purpose:
  description: "Creates Jira Epics and child Stories from a structured payload, resolving logical parent IDs and embedding cross-reference hyperlinks in ADF descriptions."
  platform: jira
  operation: create-issue

interface:
  parameters:
    inputJSON:
      type: object
      required: true
      description: >
        Dictionary with the following fields:
          projectKey  (string, optional) — Jira project key; falls back to JIRA_PROJECT_KEY.
          issueType   (string, optional) — Default issue type; per-issue 'issueType' overrides. Default: 'Epic'.
          userEmail   (string, optional) — Atlassian account email; falls back to JIRA_USER_EMAIL.
          apiToken    (string, optional) — Jira API token; falls back to JIRA_API_TOKEN env var.
          baseUrl     (string, optional) — Jira instance base URL; falls back to JIRA_BASE_URL.
          issues      (array, required)  — Ordered list of issue objects (epics before features):
            summary     (string, required)
            description (string|object, required)
            issueType   (string, optional)
            label       (array[string], optional) — label[0] is the logical ID (EP-01, F-01.1, ...)
            parentKey   (string, optional) — logical ID or real Jira key; resolved via id_map

  returns:
    type: string
    description: >
      Newline-joined result strings, one per issue:
        '[DRY RUN] <IssueType> "<summary>" -> <key> (parent=<key>)' in dry-run mode,
        '<IssueType> created: <KEY>  (<summary>)' on success,
        'Failed: <summary> -> HTTP <code> | Detail: <text>' on API failure.
      Fatal errors return a single 'Fatal error: ...' string.

credentials:
  source: secrets-sdk
  path: "jira"
  fields_used: [base_url, user_email, api_token]

identity:
  tool_id: "tool-L1-jira-upload-epics-001"
  role: tool-executor

  invocable_by:
    roles: [orchestrator]
    agents: [inception-jira-payload-converter-agent, any-agent-with-write-permission]

  permissions:
    operation: write
    platform: jira
    scope: "project-level"

  credential_scoping:
    method: org-from-context
    vault_path_template: "/secrets/{org_id}/jira"

resilience:
  timeout_seconds: 30
  retry: {max: 2, backoff: exponential, retry_on: [timeout, 429, 502, 503]}
  circuit_breaker: {failure_threshold: 5, reset_seconds: 60}

security:
  input_validation: "projectKey and issues list validated before any API call; ADF sanitised to remove empty nodes before POST"
  output_sanitization: "HTTP response detail surfaced on failure; empty ADF nodes sanitised; raw stack traces never returned"
  logging: "Issue summaries logged; API token never logged; dry_run mode available for offline ADF testing"
