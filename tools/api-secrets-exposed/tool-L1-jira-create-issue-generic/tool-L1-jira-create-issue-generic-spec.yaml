spec_version: "1.0"
artifact_type: tool
metadata:
  name: tool-L1-jira-create-issue-generic
  version: "1.0.0"
  layer: L1
  owner: agentic-ai-coe

purpose:
  description: "Creates one or more Jira issues with ADF-formatted descriptions using a structured JSON payload."
  platform: jira
  operation: create-issue

interface:
  parameters:
    inputJSON:
      type: object
      required: true
      description: >
        Dictionary with the following fields:
          projectKey  (string, optional) — Jira project key; falls back to JIRA_PROJECT_KEY.
          issueType   (string, optional) — Default issue type (e.g. 'Epic', 'Task'); per-issue 'issueType' overrides this.
          userEmail   (string, optional) — Atlassian account email; falls back to JIRA_USER_EMAIL.
          apiToken    (string, optional) — Jira API token; falls back to JIRA_API_TOKEN env var.
          baseUrl     (string, optional) — Jira instance base URL; falls back to JIRA_BASE_URL.
          issues      (array, required)  — List of issue objects, each with:
            summary     (string, required)
            description (string|object, required)
            issueType   (string, optional)
            label       (array[string], optional) — label[0] used as logical ID for cross-linking
            parentKey   (string, optional) — real Jira key of the parent issue

  returns:
    type: string
    description: "Newline-joined result strings, one per issue: '<IssueType> created: <KEY>' or 'Failed: <summary> → <detail>'. Fatal errors return a single 'Fatal error: ...' string."

credentials:
  source: secrets-sdk
  path: "jira"
  fields_used: [base_url, user_email, api_token]

identity:
  tool_id: "tool-L1-jira-create-issue-generic-001"
  role: tool-executor

  invocable_by:
    roles: [orchestrator]
    agents: [any-agent-with-write-permission]

  permissions:
    operation: write
    platform: jira
    scope: "project-level"

  credential_scoping:
    method: org-from-context
    vault_path_template: "/secrets/{org_id}/jira"

resilience:
  timeout_seconds: 30
  retry: {max: 2, backoff: exponential, retry_on: [timeout, 429, 502, 503]}
  circuit_breaker: {failure_threshold: 5, reset_seconds: 60}

security:
  input_validation: "All required issue fields validated before API call; description normalised before ADF conversion"
  output_sanitization: "HTTP response status and Jira error detail surfaced on failure; raw stack traces never returned to caller"
  logging: "Input summary logged; API token never logged"
