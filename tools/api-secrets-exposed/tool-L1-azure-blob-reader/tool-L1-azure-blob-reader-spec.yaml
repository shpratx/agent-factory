spec_version: "1.0"
artifact_type: tool
metadata:
  name: tool-L1-azure-blob-reader
  version: "1.0.0"
  layer: L1
  owner: agentic-ai-coe

purpose:
  description: "Reads and returns the decoded text contents of every file inside a specified folder prefix in Azure Blob Storage."
  platform: azure-blob
  operation: read

interface:
  parameters:
    folder_name:
      type: string
      required: true
      description: "Name of the folder (blob prefix) in Azure Blob Storage whose files should be read"

  returns:
    type: string
    description: >
      On success: formatted string with header + per-file sections (===== FILE: <path> =====\n<content>).
      On empty folder: informational string.
      On error: generic error string (details in azure_blob_operations.log).

credentials:
  source: secrets-sdk
  path: "azure-blob"
  fields_used: [connection_string, container_name]

identity:
  tool_id: "tool-L1-azure-blob-reader-001"
  role: tool-executor

  invocable_by:
    roles: [content-generator, orchestrator]
    agents: [any-agent-with-read-permission]

  permissions:
    operation: read
    platform: azure-blob
    scope: "org-level"

  credential_scoping:
    method: org-from-context
    vault_path_template: "/secrets/{org_id}/azure-blob"

resilience:
  timeout_seconds: 30
  retry: {max: 2, backoff: exponential, retry_on: [timeout, 429, 502, 503]}
  circuit_breaker: {failure_threshold: 5, reset_seconds: 60}

security:
  input_validation: "folder_name accepted as-is; prefix normalised (trailing slash appended)"
  output_sanitization: "Azure SDK exceptions caught and logged; generic error string returned to caller — no stack traces or internal URLs exposed"
  logging: "All operations logged to azure_blob_operations.log at INFO/ERROR level; connection string never logged"
