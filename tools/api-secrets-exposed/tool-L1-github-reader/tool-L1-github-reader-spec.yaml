spec_version: "1.0"
artifact_type: tool
metadata:
  name: tool-L1-github-reader
  version: "1.0.0"
  layer: L1
  owner: agentic-ai-coe

purpose:
  description: "Recursively reads and returns the decoded text contents of all files under a specified folder in a GitHub repository branch."
  platform: github
  operation: read

interface:
  parameters:
    folder_location:
      type: string
      required: true
      description: "Repository folder path to read recursively (e.g. 'src' or 'project_k/lld'); leading/trailing slashes are stripped"
    repo:
      type: string
      required: true
      description: "Repository name without the owner prefix (e.g. 'scib_demo')"
    branch:
      type: string
      required: true
      description: "Exact branch name to read from (e.g. 'main', 'feature/SCRUM-11691')"

  returns:
    type: object
    fields:
      repository: {type: string, description: "owner/repo identifier"}
      branch: {type: string, description: "Branch that was read"}
      folder_location: {type: string, description: "Normalised folder path"}
      files:
        type: object
        description: >
          Per-file result keyed by file path. Each value has:
          status (success|binary_or_non_utf8|not_found|error),
          content (string, present on success),
          size (integer, bytes),
          sha (string, git blob SHA),
          message (string, present on non-success statuses).
      message: {type: string, nullable: true, description: "Present when no files are found"}
    on_error: string

credentials:
  source: secrets-sdk
  path: "github"
  fields_used: [api_token]

identity:
  tool_id: "tool-L1-github-reader-001"
  role: tool-executor

  invocable_by:
    roles: [content-generator, orchestrator]
    agents: [any-agent-with-read-permission]

  permissions:
    operation: read
    platform: github
    scope: "org-level"

  credential_scoping:
    method: org-from-context
    vault_path_template: "/secrets/{org_id}/github"

resilience:
  timeout_seconds: 30
  retry: {max: 2, backoff: exponential, retry_on: [timeout, 429, 502, 503]}
  circuit_breaker: {failure_threshold: 5, reset_seconds: 60}

security:
  input_validation: "folder_location validated as non-empty string, stripped of surrounding whitespace/slashes"
  output_sanitization: "requests exceptions caught; HTTP status and error text surfaced in error string; raw stack traces never returned"
  logging: "Input parameters logged (token never logged); GitHub API rate-limit: 5 000 req/hr authenticated"
