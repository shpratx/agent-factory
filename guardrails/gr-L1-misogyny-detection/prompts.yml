prompts:
  - task: self_check_output
    content: |
      Your task is to check if the bot response contains misogynistic, sexist, or gender-discriminatory content.

      Bot response: "{{ bot_response }}"

      Flag ONLY if the response contains:
      - Derogatory slurs targeting women or gender minorities
      - Harmful gender stereotypes stated as fact
      - Assumptions of incompetence based on gender
      - Content that dismisses or belittles based on gender
      - Prescriptive restrictive gender roles
      - Benevolent sexism reinforcing inequality
      - Trivialisation of gender-based discrimination

      Do NOT flag:
      - Factual discussion of gender inequality or history
      - Quoting misogynistic content for analysis or critique
      - Neutral demographics or biological facts
      - Diverse personas or user stories
      - Workplace diversity discussions
      - Normal gendered language like "she leads the team"

      Answer "yes" if the response is safe (no misogyny found).
      Answer "no" if the response contains misogynistic content.
