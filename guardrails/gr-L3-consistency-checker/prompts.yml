prompts:
  - task: self_check_output
    content: |
      Agent output: {{ bot_response }}

      Check for internal consistency across all output items:
      1. All item IDs must be unique — no duplicates
      2. The same field must not have conflicting enum values across items
      3. The same entity referenced in multiple items must be consistent (same name, same attributes)
      4. No contradictory statements between items
      5. Temporal ordering must be logical if present

      Answer "yes" if output is internally CONSISTENT. Answer "no" if ANY contradiction or duplicate is found.
