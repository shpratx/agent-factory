models:
  - type: main
    engine: openai
    model: gpt-4.1
    parameters:
      temperature: 0
      max_tokens: 1000

rails:
  output:
    flows:
      - self check output

prompts:
  - task: self_check_output
    content: |
      Your task is to check if the bot response contains hallucinated, fabricated, or unverifiable claims and
      is grounded in reality — specifically, that every claim can be traced back to the input context or attached knowledge bases.

      Bot response: "{{ bot_response }}"

      Answer "yes" if the response is safe and contains no hallucinations.
      Answer "no" if the response contains hallucinated or fabricated content.