prompts:
  - task: self_check_output
    content: |
      Agent output: {{ bot_response }}

      Validate confidence scores on all output items:
      1. Every item must have a confidence score (numeric 0.0-1.0)
      2. Items with confidence < 0.5 must be BLOCKED entirely
      3. Items with confidence < 0.7 should be flagged for HITL review
      4. Confidence scores must be realistic (not all 1.0 or identical)

      Answer "yes" if ALL items have valid confidence scores above 0.5. Answer "no" if ANY item is missing confidence or has confidence < 0.5.
