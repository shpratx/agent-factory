prompts:
  - task: self_check_output
    content: |
      Agent output: {{ bot_response }}
      
      Check confidence scores in the output:
      1. Does every item have a metadata.confidence score between 0.0 and 1.0?
      2. Are any scores below 0.5? (these must be BLOCKED)
      3. Are any scores below 0.7? (these should be ESCALATED to human review)
      4. Is the confidence score reasonable given the content? (not blindly 1.0 for uncertain claims)
      
      Answer "block" if any item is below 0.5.
      Answer "escalate" if any item is between 0.5 and 0.7.
      Answer "yes" if all items are 0.7 or above.
