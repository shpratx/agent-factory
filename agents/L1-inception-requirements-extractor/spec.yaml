# Agent Specification Document
spec_version: "1.0"
artifact_type: agent
metadata:
  name: L1-inception-requirements-extractor
  version: "1.0.0"
  layer: L1
  phase: inception
  owner: agentic-ai-coe
  created: 2026-06-14

purpose:
  description: "Extracts structured requirements from a product idea or vision document and generates a PRD markdown artifact uploaded to blob storage"
  input: "Plain-text product idea, feature description, or vision document"
  output: "Categorised requirements (10 categories) + PRD document artifact in blob storage"
  business_value: "Transforms unstructured ideas into actionable, structured requirements and a PRD document that downstream agents can consume for story generation, design, and architecture"

prompt:
  ref: "prompts/L1-inception-requirements-extractor/instructions.md"
  version: "1.0.0"
  description: "Extracts and categorises requirements with MoSCoW prioritisation"

contract:
  input_schema: "$ref: schemas/agent-input-contract-schema.json"
  output_schema: "$ref: schemas/agent-output-schema.json"

  input:
    accepts_from_agents: [any]
    accepts_direct_input: true
    accepts_file_upload:
      enabled: true
      formats: [".md", ".txt", ".json", ".pdf"]
    required_parameters:
      idea: {type: string, description: "Plain-text product idea or vision document"}
    optional_parameters:
      domain: {type: string, default: "general", description: "Domain context for prioritisation"}
      priority_guidance: {type: string, description: "Additional priority context from stakeholder"}

  output:
    $ref: "output_schema.json"

context:
  knowledge_bases:
    - kb-L1-enterprise-architecture
    - kb-L1-prd-document-template
  guardrails:
    - gr-L1-output-schema-validator
    - gr-L1-pii-detection
    - gr-L3-hallucination-detector
    - gr-L3-citation-validator
    - gr-L3-consistency-checker
  tools:
    - blob-storage-upload

quality:
  evaluation_ref: "evaluation.md"
  min_score: 7.0
  hallucination_check: true
  consistency_check: true

versioning:
  input_version: "1.0"
  output_version: "1.0"
  instruction_hash: "sha256:pending"
