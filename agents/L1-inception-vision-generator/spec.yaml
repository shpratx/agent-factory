spec_version: "1.0"
artifact_type: agent
metadata:
  name: L1-inception-vision-generator
  version: "1.0.0"
  layer: L1
  phase: inception
  owner: agentic-ai-coe
  created: "2026-06-19"

purpose:
  description: "Converts a product idea into a comprehensive vision document grounded in domain knowledge."
  input: "A product idea (text description) and a domain knowledge base"
  output: "A markdown vision document uploaded to Azure Blob Storage, with artifact location in standard AgentOutput"
  business_value: "Eliminates weeks of manual vision document drafting by generating industry-grade documents from an idea and domain context"

prompt:
  ref: "prompts/L1-inception-vision-generator/instructions.md"
  version: "1.0.0"
  description: "Generates a vision document following the 5-section structure with market research grounded in domain KB"

contract:
  input_schema: "$ref: schemas/agent-input-contract-schema.json"
  output_schema: "$ref: schemas/agent-output-schema.json"

  input:
    accepts_from_agents: [any]
    accepts_direct_input: true
    accepts_file_upload:
      enabled: true
      formats: [".md", ".txt", ".json", ".pdf"]
    required_parameters:
      idea: {type: string, description: "The product idea or concept to develop into a vision document"}
    optional_parameters:
      product_name: {type: string, default: "", description: "Preferred product name (agent will derive one if not provided)"}
      target_market: {type: string, default: "", description: "Target market segment hint"}
      constraints: {type: string, default: "", description: "Known business constraints or boundaries"}

  output:
    $ref: "output_schema.json"

context:
  knowledge_bases:
    - kb-L2-{domain}  # Domain KB attached at runtime
  guardrails:
    - gr-L1-output-schema-validator
    - gr-L1-pii-detection
    - gr-L3-hallucination-detector
    - gr-L3-citation-validator
    - gr-L3-consistency-checker
  tools:
    - tool-L1-azure-blob-upload

quality:
  evaluation_ref: "evaluation.md"
  min_score: 7.0
  hallucination_check: true
  consistency_check: true

versioning:
  input_version: "1.0"
  output_version: "1.0"
  instruction_hash: "sha256:pending"
