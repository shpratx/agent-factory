# Agent Specification Document
spec_version: "1.0"
artifact_type: agent
metadata:
  name: L1-inception-workflow-summariser
  version: "1.0.0"
  layer: L1
  phase: inception
  owner: agentic-ai-coe
  created: "2026-06-23"

purpose:
  description: "Summarises a complete workflow execution by synthesising the execution summaries of all prior agents into a plain-English narrative"
  input: "Array of AgentOutput objects from all agents executed in the same workflow"
  output: "Plain-English workflow summary covering intent, artifacts generated, resources used, and outcome"
  business_value: "Provides stakeholders with an at-a-glance understanding of what an entire workflow produced without reading individual agent outputs"

prompt:
  ref: "prompts/L1-inception-workflow-summariser/instructions.md"
  version: "1.0.0"
  description: "Synthesises execution summaries from all workflow agents into a cohesive narrative"

contract:
  input_schema: "$ref: schemas/agent-input-contract-schema.json"
  output_schema: "$ref: schemas/agent-output-schema.json"

  input:
    accepts_from_agents: [any]
    accepts_direct_input: false
    accepts_file_upload:
      enabled: false
    required_parameters:
      agent_outputs: {type: array, description: "Array of AgentOutput JSON objects from all prior agents in the workflow"}
    optional_parameters:
      workflow_name: {type: string, default: "", description: "Human-readable name for the workflow being summarised"}

  output:
    $ref: "output_schema.json"

context:
  knowledge_bases: []
  guardrails:
    - gr-L1-output-schema-validator
    - gr-L1-pii-detection
    - gr-L3-hallucination-detector
    - gr-L3-consistency-checker
  tools: []

quality:
  evaluation_ref: "evaluation.md"
  min_score: 7.0
  hallucination_check: true
  consistency_check: true

versioning:
  input_version: "1.0"
  output_version: "1.0"
  instruction_hash: "sha256:pending"
